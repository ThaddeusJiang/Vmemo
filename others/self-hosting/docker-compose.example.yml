services:
  vmemo:
    image: thaddeusjiang/vmemo:latest
    command: ["start"]
    restart: on-failure
    env_file:
      - .env
    ports:
      - "14000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      typesense:
        condition: service_healthy

  postgres:
    image: postgres:17
    restart: on-failure
    hostname: postgres
    ports:
      - "54321:5432"
    volumes:
      - ./vmemo_data/pg-data:/var/lib/postgresql/data
      - ./docker/postgres/initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vmemo"]
      interval: 2s
      timeout: 5s
      retries: 20
      start_period: 5s
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vmemo

  typesense:
    image: typesense/typesense:27.1
    restart: on-failure
    hostname: typesense
    ports:
      - "8766:8108"
    volumes:
      - ./vmemo_data/ts-data:/data
    command: "--data-dir /data --api-key=${TYPESENSE_API_KEY:?TYPESENSE_API_KEY is required} --enable-cors"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -lc 'exec 3<>/dev/tcp/127.0.0.1/8108 && printf \"GET /health HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && grep -q \"200 OK\" <&3'",
        ]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s

  cloudflared:
    profiles:
      - preview
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    depends_on:
      - vmemo
    env_file:
      - .env
    command: tunnel --no-autoupdate run --url http://vmemo:4000
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN:-}
