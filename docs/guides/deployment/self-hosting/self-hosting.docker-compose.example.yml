services:
  vmemo:
    image: thaddeusjiang/vmemo
    restart: on-failure
    env_file:
      - .env
    ports:
      - "14000:4000"
    volumes:
      - ./vmemo_data/storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      typesense:
        condition: service_healthy

  postgres:
    image: postgres:17
    restart: on-failure
    hostname: postgres
    ports:
      - "15432:5432"
    volumes:
      - ./vmemo_data/pg-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vmemo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vmemo"]
      interval: 2s
      timeout: 5s
      retries: 20
      start_period: 5s

  typesense:
    image: typesense/typesense:30.1
    restart: on-failure
    hostname: typesense
    ports:
      - "18108:8108"
    volumes:
      - ./vmemo_data/ts-data:/data
    command: "--data-dir /data --api-key=${TYPESENSE_API_KEY:?TYPESENSE_API_KEY is required} --enable-cors"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -lc 'exec 3<>/dev/tcp/127.0.0.1/8108 && printf \"GET /health HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && grep -q \"200 OK\" <&3'",
        ]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s

  cloudflared:
    image: cloudflare/cloudflared:2026.3.0
    restart: unless-stopped
    depends_on:
      - vmemo
    command: tunnel --no-autoupdate --url http://vmemo:4000 run --token ${CLOUDFLARED_TOKEN}
