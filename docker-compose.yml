services:
  postgres:
    image: postgres:16
    restart: on-failure
    hostname: postgres
    ports:
      - "54321:5432"
    volumes:
      - ./_data/pg-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vmemo_dev

  typesense:
    image: typesense/typesense:27.1
    restart: on-failure
    hostname: typesense
    ports:
      - "8766:8108"
    volumes:
      - ./_data/ts-data:/data
    command: "--data-dir /data --api-key=xyz --enable-cors"

  moondream:
    build:
      context: .
      dockerfile: Dockerfile.moondream
    restart: on-failure
    hostname: moondream
    ports:
      - "2020:2020"
    volumes:
      - ./_data/moondream-data:/root/.moondream
    environment:
      - MOONDREAM_PORT=2020
