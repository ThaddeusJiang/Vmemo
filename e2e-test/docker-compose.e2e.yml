services:
  postgres-test:
    profiles:
      - test
    image: postgres:18
    hostname: postgres-test
    restart: on-failure
    ports:
      - "10003:5432"
    volumes:
      - pg-test-data:/var/lib/postgresql
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vmemo_test

  typesense-test:
    profiles:
      - test
    image: typesense/typesense:30.1
    hostname: typesense-test
    restart: on-failure
    ports:
      - "10004:8108"
    volumes:
      - ts-test-data:/data
    command: "--data-dir /data --api-key=xyz --enable-cors"

  vmemo:
    image: thaddeusjiang/vmemo:e2e
    command: ["start"]
    restart: on-failure
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-ecto://postgres:postgres@host.docker.internal:10003/vmemo_test}
      TYPESENSE_URL: ${TYPESENSE_URL:-http://host.docker.internal:10004}
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY:-xyz}
      OPENROUTER_API_KEY: "fake-key"
      MOONDREAM_URL: ""
      MOONDREAM_API_KEY: "fake-key"
      RESEND_API_KEY: "fake-key"
      SENTRY_DSN: https://public@example.com/1
      ADMIN_TOKEN: test-admin-password
      SECRET_KEY_BASE: testtesttesttesttesttesttesttesttesttesttesttesttesttesttesttest
      PHX_SERVER: "true"
      PHX_HOST: localhost
      PORT: "4000"
      E2E_AUTO_SEED: "true"

volumes:
  pg-test-data:
  ts-test-data:
