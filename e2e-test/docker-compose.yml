services:
  e2e-seed:
    image: postgres:17
    restart: "no"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PGHOST: ${E2E_PGHOST:-host.docker.internal}
      PGPORT: ${E2E_PGPORT:-5432}
      PGUSER: ${E2E_PGUSER:-postgres}
      PGPASSWORD: ${E2E_PGPASSWORD:-postgres}
      PGDATABASE: ${E2E_PGDATABASE:-vmemo_dev}
    volumes:
      - ./fixtures/prepare-e2e-auth.sql:/e2e/prepare-e2e-auth.sql:ro
    command:
      - sh
      - -lc
      - psql -v ON_ERROR_STOP=1 -f /e2e/prepare-e2e-auth.sql

  vmemo:
    platform: ${VMEMO_PLATFORM:-linux/amd64}
    image: ${VMEMO_IMAGE:-thaddeusjiang/vmemo:develop}
    command: ["start"]
    restart: on-failure
    depends_on:
      e2e-seed:
        condition: service_completed_successfully
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${VMEMO_PORT:-4000}:4000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-ecto://postgres:postgres@host.docker.internal:5432/vmemo}
      TYPESENSE_URL: ${TYPESENSE_URL:-http://host.docker.internal:8108}
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY:-xyz}
      TYPESENSE_IMAGE_EMBEDDING: ${TYPESENSE_IMAGE_EMBEDDING:-false}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      MOONDREAM_URL: ${MOONDREAM_URL:-}
      MOONDREAM_API_KEY: ${MOONDREAM_API_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-test-resend-key}
      PHX_SERVER: ${PHX_SERVER:-true}
      ECTO_IPV6: ${ECTO_IPV6:-false}
      POOL_SIZE: ${POOL_SIZE:-10}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-test-admin-password}
      SENTRY_DSN: ${SENTRY_DSN:-https://public@example.com/1}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-testtesttesttesttesttesttesttesttesttesttesttesttesttesttesttest}
      PHX_HOST: ${PHX_HOST:-localhost}
      PORT: ${PORT:-4000}
      DNS_CLUSTER_QUERY: ${DNS_CLUSTER_QUERY:-}
