name: Build CI Docker Image

description: Build and package Docker image for CI jobs.

inputs:
  image_name:
    description: Docker image name:tag to build and load.
    required: true
  artifact_name:
    description: Artifact name for passing image between jobs.
    required: false
    default: vmemo-e2e-image

outputs:
  image_tar:
    description: Path to the generated image tar file.
    value: ${{ steps.meta.outputs.image_tar }}

runs:
  using: composite
  steps:
    - name: Define image tar path
      id: meta
      shell: bash
      run: |
        mkdir -p /tmp/vmemo-ci-image
        echo "image_tar=/tmp/vmemo-ci-image/${{ inputs.artifact_name }}.tar" >> "$GITHUB_OUTPUT"

    - name: Build and save image tar
      shell: bash
      run: |
        docker build \
          --file ./Dockerfile \
          --tag "${{ inputs.image_name }}" \
          .

        docker save "${{ inputs.image_name }}" -o "${{ steps.meta.outputs.image_tar }}"

    - name: Upload image artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact_name }}
        path: ${{ steps.meta.outputs.image_tar }}
        retention-days: 7
        if-no-files-found: error
