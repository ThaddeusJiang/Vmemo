name: Gettext Sync Check

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

concurrency:
  group: gettext-sync-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  MIX_ENV: test

jobs:
  gettext-sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: erlef/setup-beam@v1.23.0
        with:
          otp-version: "28"
          elixir-version: "1.19.5"

      - name: Cache deps and build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ hashFiles('mix.lock') }}

      - name: Install dependencies
        run: mix deps.get

      - name: Check gettext sync
        run: ./scripts/check_gettext_sync.sh
