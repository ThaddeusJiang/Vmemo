name: Test

on:
  pull_request:

jobs:
  mix-check:
    runs-on: ubuntu-latest
    env:
      MIX_ENV: test
    strategy:
      matrix:
        otp: ["28"]
        elixir: ["1.19.5"]
    name: Check / Elixir ${{matrix.elixir}} Erlang/OTP ${{matrix.otp}}
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: erlef/setup-beam@v1.23.0
        with:
          otp-version: ${{matrix.otp}}
          elixir-version: ${{matrix.elixir}}

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: ｜
          mix compile --warnings-as-errors
          mix xref graph --format cycles --label compile-connected --fail-above 0

      - name: Format
        run: |
          mix format --check-formatted

      - name: Credo
        continue-on-error: true
        run: mix credo --strict

      - name: Sobelow
        continue-on-error: true
        run: mix sobelow --config

  mix-test:
    runs-on: ubuntu-latest
    env:
      MIX_ENV: test
      TYPESENSE_URL: ${{ secrets.TYPESENSE_URL }}
      TYPESENSE_API_KEY: ${{ secrets.TYPESENSE_API_KEY }}
      POSTGRES_PORT: "5432"

    services:
      postgres:
        image: postgres:18
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vmemo_test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    strategy:
      matrix:
        otp: ["28"]
        elixir: ["1.19.5"]
    name: Tests / Elixir ${{matrix.elixir}} Erlang/OTP ${{matrix.otp}}
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: erlef/setup-beam@v1.23.0
        with:
          otp-version: ${{matrix.otp}}
          elixir-version: ${{matrix.elixir}}

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile

      - name: Wait for Postgres
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do
            echo "Waiting for postgres..."
            sleep 1
          done

      - name: Reset Typesense
        run: mix ts.reset

      - name: Run tests
        run: mix test
