name: Test

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, labeled, unlabeled]

concurrency:
  group: test-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  MIX_ENV: test
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  TYPESENSE_URL: ${{ secrets.TYPESENSE_URL }}
  TYPESENSE_API_KEY: ${{ secrets.TYPESENSE_API_KEY }}
  MOONDREAM_URL: ${{ secrets.MOONDREAM_URL }}
  MOONDREAM_API_KEY: ${{ secrets.MOONDREAM_API_KEY }}
  TEST_POOL_SIZE: "10"
  TEST_DB_QUEUE_TARGET_MS: "3000"
  TEST_DB_QUEUE_INTERVAL_MS: "5000"

jobs:
  mix-check:
    if: ${{ contains(github.event.pull_request.labels.*.name, 'LGTM') }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2
      - uses: erlef/setup-beam@v1.23.0
        id: beam
        with:
          otp-version: "28"
          elixir-version: "1.19.5"

      - name: Cache deps and build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ hashFiles('mix.lock') }}

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: |
          mix compile --warnings-as-errors
          mix xref graph --format cycles --label compile-connected --fail-above 0

      - name: Format
        run: |
          mix format --check-formatted

      - name: Credo
        continue-on-error: true
        run: mix credo --strict

      - name: Sobelow
        continue-on-error: true
        run: mix sobelow --config

      - name: Gettext sync
        run: mix gettext.extract --check-up-to-date

  mix-test:
    if: ${{ contains(github.event.pull_request.labels.*.name, 'LGTM') }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2
      - uses: erlef/setup-beam@v1.23.0
        id: beam
        with:
          otp-version: "28"
          elixir-version: "1.19.5"

      - name: Cache deps and build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ hashFiles('mix.lock') }}

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile

      - name: Reset
        run: mix reset

      - name: Run tests
        run: mix test
