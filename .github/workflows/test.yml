name: Test

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, labeled, unlabeled]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: test-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

env:
  MIX_ENV: test
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  TYPESENSE_URL: ${{ secrets.TYPESENSE_URL }}
  TYPESENSE_API_KEY: ${{ secrets.TYPESENSE_API_KEY }}
  MOONDREAM_URL: ${{ secrets.MOONDREAM_URL }}
  MOONDREAM_API_KEY: ${{ secrets.MOONDREAM_API_KEY }}
  TEST_POOL_SIZE: "10"
  TEST_DB_QUEUE_TARGET_MS: "3000"
  TEST_DB_QUEUE_INTERVAL_MS: "5000"

jobs:
  mix-check:
    if: ${{ github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'LGTM') }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: erlef/setup-beam@v1.23.0
        id: beam
        with:
          otp-version: "28"
          elixir-version: "1.19.5"

      - name: Cache deps and build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ hashFiles('mix.lock') }}

      - name: Install dependencies
        run: mix deps.get

      - name: Format
        run: mix format

      - name: Commit formatted files
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore(ci): auto format"

      - name: Compile
        run: mix compile --warnings-as-errors

      - name: Gettext sync
        run: mix gettext.extract --check-up-to-date

      - name: Xref cycles
        run: mix xref graph --format cycles --label compile --fail-above 0

      - name: Credo (non-blocking)
        run: mix credo --mute-exit-status

      - name: Sobelow
        run: mix sobelow --config

      - name: Hex audit
        run: mix hex.audit

      - name: Check unused lock deps
        run: mix deps.unlock --check-unused

  mix-test:
    if: ${{ github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'LGTM') }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2
      - uses: erlef/setup-beam@v1.23.0
        id: beam
        with:
          otp-version: "28"
          elixir-version: "1.19.5"

      - name: Cache deps and build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ hashFiles('mix.lock') }}

      - name: Install dependencies
        run: mix deps.get

      - name: Install ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
          magick -version || convert -version

      - name: Compile
        run: mix compile

      - name: Reset
        run: mix reset

      - name: Run tests with ExCoveralls
        run: mix coveralls.json

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./cover/excoveralls.json
          fail_ci_if_error: false
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}
