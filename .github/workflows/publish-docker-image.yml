name: Publish Docker Image

on:
  release:
    types:
      - published

permissions:
  contents: read

env:
  IMAGE_NAME: thaddeusjiang/vmemo

jobs:
  build_by_arch:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            artifact_suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            artifact_suffix: arm64

    runs-on: ${{ matrix.runner }}
    env:
      DOCKER_BUILD_RECORD_UPLOAD: "false"
      DOCKER_BUILD_SUMMARY: "false"

    steps:
      - name: Checkout repository at release tag
        uses: actions/checkout@v6.0.2
        with:
          ref: refs/tags/${{ github.event.release.tag_name }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0
        with:
          driver: docker-container

      - name: Log in to Docker Hub
        uses: docker/login-action@v4.0.0
        with:
          username: thaddeusjiang
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image by digest
        id: build
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true

      - name: Export image digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: digest-${{ matrix.artifact_suffix }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge_manifest:
    runs-on: ubuntu-latest
    needs: build_by_arch

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to Docker Hub
        uses: docker/login-action@v4.0.0
        with:
          username: thaddeusjiang
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Download digest artifacts
        uses: actions/download-artifact@v5.0.0
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Create and push multi-platform manifest
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          cd /tmp/digests
          refs=()
          for file in *; do
            refs+=("${IMAGE_NAME}@sha256:${file}")
          done

          docker buildx imagetools create \
            -t "${IMAGE_NAME}:${RELEASE_TAG}" \
            "${refs[@]}"

      - name: Verify multi-platform manifest
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: docker buildx imagetools inspect "${IMAGE_NAME}:${RELEASE_TAG}"
