name: Publish Docker Image

on:
  release:
    types:
      - published

permissions:
  contents: read

env:
  IMAGE_NAME: thaddeusjiang/vmemo
  RELEASE_TAG: ${{ github.event.release.tag_name }}

jobs:
  build_by_arch:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            arch_suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch_suffix: arm64

    runs-on: ${{ matrix.runner }}
    env:
      DOCKER_BUILD_RECORD_UPLOAD: "false"
      DOCKER_BUILD_SUMMARY: "false"

    steps:
      - name: Checkout repository at release tag
        uses: actions/checkout@v6.0.2
        with:
          ref: refs/tags/${{ github.event.release.tag_name }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0
        with:
          driver: docker-container

      - name: Log in to Docker Hub
        uses: docker/login-action@v4.0.0
        with:
          username: thaddeusjiang
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image by architecture tag
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: ${{ matrix.platform }}
          tags: ${{ env.IMAGE_NAME }}:${{ env.RELEASE_TAG }}-${{ matrix.arch_suffix }}

  merge_manifest:
    runs-on: ubuntu-latest
    needs: build_by_arch

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to Docker Hub
        uses: docker/login-action@v4.0.0
        with:
          username: thaddeusjiang
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push multi-platform manifest
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            -t "${IMAGE_NAME}:${RELEASE_TAG}" \
            "${IMAGE_NAME}:${RELEASE_TAG}-amd64" \
            "${IMAGE_NAME}:${RELEASE_TAG}-arm64"

      - name: Verify multi-platform manifest
        run: docker buildx imagetools inspect "${IMAGE_NAME}:${RELEASE_TAG}"

      - name: Remove temporary architecture tags
        run: |
          docker buildx imagetools rm "${IMAGE_NAME}:${RELEASE_TAG}-amd64" || true
          docker buildx imagetools rm "${IMAGE_NAME}:${RELEASE_TAG}-arm64" || true
