name: Publish Docker Image

on:
  release:
    types:
      - published

permissions:
  contents: read

env:
  IMAGE_NAME: thaddeusjiang/vmemo
  IMAGE_PLATFORMS: linux/amd64,linux/arm64/v8

jobs:
  publish_docker_image:
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILD_RECORD_UPLOAD: "false"
      DOCKER_BUILD_SUMMARY: "false"

    steps:
      - name: Read release tag
        id: version
        uses: ./.github/actions/resolve-calver
        with:
          raw_version: ${{ github.event.release.tag_name }}

      - name: Checkout repository at release tag
        uses: actions/checkout@v6.0.2
        with:
          ref: refs/tags/${{ steps.version.outputs.version }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0
        with:
          driver: docker-container

      - name: Log in to Docker Hub
        uses: docker/login-action@v4.0.0
        with:
          username: thaddeusjiang
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: ${{ env.IMAGE_PLATFORMS }}
          tags: ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}

      - name: Verify multi-platform manifest
        run: docker buildx imagetools inspect "${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}"
