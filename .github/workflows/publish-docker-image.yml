name: Publish Docker Image

on:
  push:
    branches:
      - develop
  release:
    types:
      - published

permissions:
  contents: read

concurrency:
  group: publish-docker-image-${{ github.event_name }}-${{ github.ref_name || github.event.release.tag_name }}
  cancel-in-progress: true

env:
  IMAGE_NAME: thaddeusjiang/vmemo
  TARGET_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || 'develop' }}
  CHECKOUT_REF: ${{ github.event_name == 'release' && format('refs/tags/{0}', github.event.release.tag_name) || github.ref }}

jobs:
  build_by_arch:
    name: build ${{ matrix.arch }} image
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    env:
      DOCKER_BUILD_RECORD_UPLOAD: "false"
      DOCKER_BUILD_SUMMARY: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Validate release tag format
        if: ${{ github.event_name == 'release' }}
        run: |
          set -euo pipefail
          if ! [[ "${TARGET_TAG}" =~ ^[0-9]{4}\.[0-9]{1,2}\.[0-9]+$ ]]; then
            echo "Invalid release tag: ${TARGET_TAG}"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to Docker Hub
        uses: docker/login-action@v4.0.0
        with:
          username: thaddeusjiang
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.arch }} image
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: ${{ matrix.platform }}
          tags: ${{ env.IMAGE_NAME }}:${{ env.TARGET_TAG }}-${{ matrix.arch }}

  push_image:
    name: push image
    runs-on: ubuntu-latest
    needs:
      - build_by_arch

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to Docker Hub
        uses: docker/login-action@v4.0.0
        with:
          username: thaddeusjiang
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push multi-platform manifest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            -t "${IMAGE_NAME}:${TARGET_TAG}" \
            "${IMAGE_NAME}:${TARGET_TAG}-amd64" \
            "${IMAGE_NAME}:${TARGET_TAG}-arm64"

          if [ "${{ github.event_name }}" = "release" ]; then
            IS_PRERELEASE="$(jq -r '.release.prerelease // false' "${GITHUB_EVENT_PATH}")"
            if [ "${IS_PRERELEASE}" = "true" ]; then
              docker buildx imagetools create \
                -t "${IMAGE_NAME}:pre-release" \
                "${IMAGE_NAME}:${TARGET_TAG}-amd64" \
                "${IMAGE_NAME}:${TARGET_TAG}-arm64"
            else
              LATEST_RELEASE_TAG="$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq '.tag_name')"
              if [ "${LATEST_RELEASE_TAG}" = "${TARGET_TAG}" ]; then
                docker buildx imagetools create \
                  -t "${IMAGE_NAME}:latest" \
                  "${IMAGE_NAME}:${TARGET_TAG}-amd64" \
                  "${IMAGE_NAME}:${TARGET_TAG}-arm64"
              else
                echo "Skip latest image: current release ${TARGET_TAG} is not repository latest release (${LATEST_RELEASE_TAG})."
              fi
            fi
          fi

      - name: Verify multi-platform manifest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          docker buildx imagetools inspect "${IMAGE_NAME}:${TARGET_TAG}"

          if [ "${{ github.event_name }}" = "release" ]; then
            IS_PRERELEASE="$(jq -r '.release.prerelease // false' "${GITHUB_EVENT_PATH}")"
            if [ "${IS_PRERELEASE}" = "true" ]; then
              docker buildx imagetools inspect "${IMAGE_NAME}:pre-release"
            else
              LATEST_RELEASE_TAG="$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq '.tag_name')"
              if [ "${LATEST_RELEASE_TAG}" = "${TARGET_TAG}" ]; then
                docker buildx imagetools inspect "${IMAGE_NAME}:latest"
              fi
            fi
          fi

      - name: Remove temporary architecture tags
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_USERNAME: thaddeusjiang
        run: |
          bash scripts/ci/delete-dockerhub-temp-tags.sh \
            "${TARGET_TAG}-amd64" \
            "${TARGET_TAG}-arm64"
