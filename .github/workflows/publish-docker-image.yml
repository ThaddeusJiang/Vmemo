name: Publish Docker Image

on:
  push:
    branches:
      - develop
  release:
    types:
      - published

permissions:
  contents: read

concurrency:
  group: publish-docker-image-${{ github.event_name }}-${{ github.ref_name || github.event.release.tag_name }}
  cancel-in-progress: true

env:
  IMAGE_NAME: thaddeusjiang/vmemo
  TARGET_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || 'develop' }}
  CHECKOUT_REF: ${{ github.event_name == 'release' && format('refs/tags/{0}', github.event.release.tag_name) || github.ref }}

jobs:
  build_by_arch:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            platform_pair: linux-amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            platform_pair: linux-arm64

    runs-on: ${{ matrix.runner }}
    env:
      DOCKER_BUILD_RECORD_UPLOAD: "false"
      DOCKER_BUILD_SUMMARY: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0
        with:
          driver: docker-container

      - name: Log in to Docker Hub
        uses: docker/login-action@v4.0.0
        with:
          username: thaddeusjiang
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image by digest
        id: build
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true

      - name: Export image digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.platform_pair }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge_manifest:
    runs-on: ubuntu-latest
    needs: build_by_arch

    steps:
      - name: Download digest artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to Docker Hub
        uses: docker/login-action@v4.0.0
        with:
          username: thaddeusjiang
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push multi-platform manifest
        run: |
          set -euo pipefail
          cd /tmp/digests
          images=""
          for digest_file in *; do
            images="${images} ${IMAGE_NAME}@sha256:${digest_file}"
          done

          docker buildx imagetools create \
            -t "${IMAGE_NAME}:${TARGET_TAG}" \
            ${images}

          if [ "${{ github.event_name }}" = "release" ]; then
            docker buildx imagetools create \
              -t "${IMAGE_NAME}:latest" \
              ${images}
          fi

      - name: Verify multi-platform manifest
        run: |
          docker buildx imagetools inspect "${IMAGE_NAME}:${TARGET_TAG}"
          if [ "${{ github.event_name }}" = "release" ]; then
            docker buildx imagetools inspect "${IMAGE_NAME}:latest"
          fi
