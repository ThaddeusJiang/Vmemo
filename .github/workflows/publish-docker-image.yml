name: Publish Docker Image

on:
  push:
    branches:
      - develop
  release:
    types:
      - published

permissions:
  contents: read

concurrency:
  group: publish-docker-image-${{ github.event_name }}-${{ github.ref_name || github.event.release.tag_name }}
  cancel-in-progress: true

env:
  IMAGE_NAME: thaddeusjiang/vmemo
  TARGET_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || 'develop' }}
  CHECKOUT_REF: ${{ github.event_name == 'release' && format('refs/tags/{0}', github.event.release.tag_name) || github.ref }}

jobs:
  build_amd64_image:
    name: build amd64 image
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-24.04
    env:
      DOCKER_BUILD_RECORD_UPLOAD: "false"
      DOCKER_BUILD_SUMMARY: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Validate release tag format
        if: ${{ github.event_name == 'release' }}
        run: |
          set -euo pipefail
          if ! [[ "${TARGET_TAG}" =~ ^[0-9]{4}\.[0-9]{1,2}\.[0-9]+$ ]]; then
            echo "Invalid release tag: ${TARGET_TAG}"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to Docker Hub
        uses: docker/login-action@v4.0.0
        with:
          username: thaddeusjiang
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push amd64 image
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ env.IMAGE_NAME }}:${{ env.TARGET_TAG }}-amd64

  build_arm64_image:
    name: build arm64 image
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-24.04-arm
    env:
      DOCKER_BUILD_RECORD_UPLOAD: "false"
      DOCKER_BUILD_SUMMARY: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Validate release tag format
        if: ${{ github.event_name == 'release' }}
        run: |
          set -euo pipefail
          if ! [[ "${TARGET_TAG}" =~ ^[0-9]{4}\.[0-9]{1,2}\.[0-9]+$ ]]; then
            echo "Invalid release tag: ${TARGET_TAG}"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to Docker Hub
        uses: docker/login-action@v4.0.0
        with:
          username: thaddeusjiang
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push arm64 image
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/arm64
          tags: ${{ env.IMAGE_NAME }}:${{ env.TARGET_TAG }}-arm64

  push_image:
    name: push image
    runs-on: ubuntu-latest
    needs:
      - build_amd64_image
      - build_arm64_image

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to Docker Hub
        uses: docker/login-action@v4.0.0
        with:
          username: thaddeusjiang
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push multi-platform manifest
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            -t "${IMAGE_NAME}:${TARGET_TAG}" \
            "${IMAGE_NAME}:${TARGET_TAG}-amd64" \
            "${IMAGE_NAME}:${TARGET_TAG}-arm64"

          if [ "${{ github.event_name }}" = "release" ]; then
            docker buildx imagetools create \
              -t "${IMAGE_NAME}:latest" \
              "${IMAGE_NAME}:${TARGET_TAG}-amd64" \
              "${IMAGE_NAME}:${TARGET_TAG}-arm64"
          fi

      - name: Verify multi-platform manifest
        run: |
          docker buildx imagetools inspect "${IMAGE_NAME}:${TARGET_TAG}"
          if [ "${{ github.event_name }}" = "release" ]; then
            docker buildx imagetools inspect "${IMAGE_NAME}:latest"
          fi

      - name: Remove temporary architecture tags
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_USERNAME: thaddeusjiang
        run: |
          bash scripts/ci/delete-dockerhub-temp-tags.sh \
            "${TARGET_TAG}-amd64" \
            "${TARGET_TAG}-arm64"
