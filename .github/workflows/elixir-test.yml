name: Elixir CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      MIX_ENV: test
      TYPESENSE_URL: http://localhost:8108
      TYPESENSE_API_KEY: xyz

    services:
      postgres:
        image: postgres:16
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vmemo_test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      matrix:
        otp: ["27"]
        elixir: ["1.17.3"]
    name: OTP ${{matrix.otp}} / Elixir ${{matrix.elixir}}
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{matrix.otp}}
          elixir-version: ${{matrix.elixir}}

      - name: Install dependencies
        run: mix deps.get

      - name: Wait for Postgres
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do
            echo "Waiting for postgres..."
            sleep 1
          done

      - name: Set up database
        run: |
          mix ecto.create
          mix ecto.migrate

      - name: Start Typesense
        run: |
          docker run -d \
            --name typesense \
            -p 8108:8108 \
            --tmpfs /data:rw,size=512m \
            typesense/typesense:27.1 \
            --data-dir=/data \
            --api-key=xyz
          
          echo "Typesense container started, checking logs..."
          sleep 2
          docker logs typesense

      - name: Wait for Typesense
        run: |
          timeout=60
          count=0
          until curl -f http://localhost:8108/health; do
            if [ $count -ge $timeout ]; then
              echo "Timeout waiting for Typesense"
              docker logs typesense
              exit 1
            fi
            echo "Waiting for typesense... ($count/$timeout)"
            sleep 1
            count=$((count + 1))
          done
          echo "Typesense is ready!"

      - name: Reset Typesense
        run: |
          MIX_ENV=test mix ts.reset

      - name: Sleep for Typesense to reset
        run: sleep 20

      - name: Run tests
        run: |
          mix test
