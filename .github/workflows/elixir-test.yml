name: Elixir CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      MIX_ENV: test
      TYPESENSE_URL: http://localhost:8108
      TYPESENSE_API_KEY: xyz

    services:
      postgres:
        image: postgres:16
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vmemo_test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      typesense:
        image: typesense/typesense:27.1
        ports:
          - 8108:8108
        env:
          TYPESENSE_API_KEY: xyz
        options: >-
          --health-cmd "curl -f http://localhost:8108/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --tmpfs /data

    strategy:
      matrix:
        otp: ["27"]
        elixir: ["1.17.3"]
    name: OTP ${{matrix.otp}} / Elixir ${{matrix.elixir}}
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{matrix.otp}}
          elixir-version: ${{matrix.elixir}}

      - name: Install dependencies
        run: mix deps.get

      - name: Wait for Postgres
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do
            echo "Waiting for postgres..."
            sleep 1
          done

      - name: Set up database
        run: |
          mix ecto.create
          mix ecto.migrate

      - name: Wait for Typesense
        run: |
          until curl -f http://localhost:8108/health; do
            echo "Waiting for typesense..."
            sleep 1
          done

      - name: Reset Typesense
        run: |
          MIX_ENV=test mix ts.reset

      - name: Sleep for Typesense to reset
        run: sleep 20

      - name: Run tests
        run: |
          mix test
