name: Elixir Checks

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      MIX_ENV: test
      TYPESENSE_URL: http://localhost:8108
      TYPESENSE_API_KEY: xyz
      POSTGRES_PORT: "5432"

    services:
      postgres:
        image: postgres:16
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vmemo_test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      typesense:
        image: typesense/typesense:27.1
        ports:
          - 8108:8108
        env:
          TYPESENSE_DATA_DIR: /data
          TYPESENSE_API_KEY: xyz
        options: >-
          --tmpfs /data:rw,size=512m

    strategy:
      matrix:
        otp: ["28"]
        elixir: ["1.19.5"]
    name: Elixir ${{matrix.elixir}} Erlang/OTP ${{matrix.otp}}
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: erlef/setup-beam@v1.23.0
        with:
          otp-version: ${{matrix.otp}}
          elixir-version: ${{matrix.elixir}}

      - name: Cache deps and build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ matrix.otp }}-${{ matrix.elixir }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Wait for Postgres
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do
            echo "Waiting for postgres..."
            sleep 1
          done

      - name: Wait for Typesense
        run: |
          timeout=60
          count=0
          until curl -fsS http://localhost:8108/health; do
            if [ $count -ge $timeout ]; then
              echo "Timeout waiting for Typesense"
              exit 1
            fi
            echo "Waiting for typesense... ($count/$timeout)"
            sleep 1
            count=$((count + 1))
          done
          echo "Typesense is ready!"

      - name: Run tests
        run: mix test
