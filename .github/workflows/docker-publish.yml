name: Publish Docker Image

on:
  push:
    tags:
      - "*"
    branches:
      - develop
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      DOCKER_PLATFORMS: linux/amd64,linux/arm64/v8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0
        with:
          driver: docker-container

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.0.0

      - name: Log in to Docker Hub
        uses: docker/login-action@v4.0.0
        with:
          username: thaddeusjiang
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute Docker tags
        id: tags
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            {
              echo "tags<<EOF"
              echo "thaddeusjiang/vmemo:${GITHUB_REF_NAME}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            {
              echo "tags<<EOF"
              echo "thaddeusjiang/vmemo:main"
              echo "thaddeusjiang/vmemo:latest"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "tags<<EOF"
            echo "thaddeusjiang/vmemo:${GITHUB_REF_NAME}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: ${{ env.DOCKER_PLATFORMS }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Docker Hub tag description
        if: startsWith(github.ref, 'refs/tags/')
        uses: ./.github/actions/dockerhub-tag-description
        with:
          username: thaddeusjiang
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: thaddeusjiang/vmemo
          tag: ${{ github.ref_name }}
          commit-sha: ${{ github.sha }}

      - name: Log out from Docker Hub
        run: docker logout
