name: Publish Docker Image

on:
  push:
    tags:
      - "*"
    branches:
      - develop
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DOCKER_PLATFORMS: linux/amd64,linux/arm64/v8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: thaddeusjiang
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image with commit SHA tag
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: ${{ env.DOCKER_PLATFORMS }}
          tags: thaddeusjiang/vmemo:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Log out from Docker Hub
        run: docker logout

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: thaddeusjiang
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Publish image for ref
        run: |
          docker buildx imagetools create \
            -t thaddeusjiang/vmemo:${{ github.ref_name }} \
            thaddeusjiang/vmemo:${{ github.sha }}

      - name: Publish :latest image
        if: github.ref == 'refs/heads/main'
        run: |
          docker buildx imagetools create \
            -t thaddeusjiang/vmemo:latest \
            thaddeusjiang/vmemo:${{ github.sha }}

      - name: Log out from Docker Hub
        run: docker logout
