name: E2E Test
run-name: >-
  ${{ github.event_name == 'workflow_dispatch'
      && (inputs.update_snapshots && 'E2E Test (Update visual snapshots)' || 'E2E Test')
      || 'E2E Test' }}

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, labeled, unlabeled]
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: Update visual snapshots
        required: true
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  e2e-test:
    name: >-
      ${{ github.event_name == 'workflow_dispatch'
          && (inputs.update_snapshots && 'Update snapshots' || 'E2E testing')
          || 'E2E testing' }}
    if: ${{ github.event_name == 'workflow_dispatch' || (contains(github.event.pull_request.labels.*.name, 'LGTM') && contains(github.event.pull_request.labels.*.name, 'run-e2e-test')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: others/e2e-test
    env:
      MIX_ENV: prod
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      TYPESENSE_URL: ${{ secrets.TYPESENSE_URL }}
      TYPESENSE_API_KEY: ${{ secrets.TYPESENSE_API_KEY }}
      OPENROUTER_API_KEY: test-openrouter-key
      MOONDREAM_URL: ${{ secrets.MOONDREAM_URL }}
      MOONDREAM_API_KEY: ${{ secrets.MOONDREAM_API_KEY }}
      RESEND_API_KEY: test-resend-key
      PHX_SERVER: "true"
      ECTO_IPV6: "false"
      POOL_SIZE: "10"
      ADMIN_TOKEN: test-admin-password
      SENTRY_DSN: https://public@example.com/1
      SECRET_KEY_BASE: testtesttesttesttesttesttesttesttesttesttesttesttesttesttesttest
      PHX_HOST: localhost
      PORT: "4000"
      DNS_CLUSTER_QUERY: ""

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Build app image (amd64, local only)
        working-directory: .
        run: docker buildx build --platform linux/amd64 --file ./Dockerfile --tag thaddeusjiang/vmemo:e2e --load .

      - name: Start app with compose
        run: |
          docker compose -f docker-compose.yml up -d

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install e2e dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers and host dependencies
        run: bunx playwright install --with-deps

      - name: Confirm app is ready
        run: |
          for i in $(seq 1 90); do
            if curl -fsS http://localhost:4000/login >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "App did not become ready in time"
          exit 1

      - name: Update e2e snapshots
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.update_snapshots }}
        run: bun run e2e:update-snapshots

      - name: Commit updated snapshots
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.update_snapshots }}
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore(e2e): update visual snapshots"
          file_pattern: "others/e2e-test/tests"

      - name: Run e2e tests
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.update_snapshots }}
        run: bun run e2e

      - name: Upload Playwright HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v5
        with:
          name: e2e-playwright-report-${{ github.run_id }}
          path: others/e2e-test/playwright-report
          if-no-files-found: ignore
          retention-days: 14

      - name: Print app logs
        if: failure()
        run: docker compose -f docker-compose.yml logs vmemo-e2e e2e-seed || true

      - name: Stop app container
        if: always()
        run: docker compose -f docker-compose.yml down || true
