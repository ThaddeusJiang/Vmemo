name: Release Draft

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version in CalVer format (YYYY.M.Patch). Leave empty to use current date."
        required: false
        type: string

permissions:
  contents: write

jobs:
  create_draft_release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Resolve release version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version }}"

          if [[ -z "$VERSION" ]]; then
            VERSION="$(TZ=Asia/Tokyo date +'%Y.%-m.%-d')"
          fi

          if [[ ! "$VERSION" =~ ^[0-9]{4}\.(1[0-2]|[1-9])\.([1-9][0-9]*)$ ]]; then
            echo "Invalid release version: '$VERSION'"
            echo "Expected CalVer: YYYY.M.Patch (no leading zero, month 1-12, patch >= 1)"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub draft release (with tag + notes)
        uses: ncipollo/release-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          tag: ${{ steps.version.outputs.version }}
          commit: main
          name: Vmemo ${{ steps.version.outputs.version }}
          draft: true
          generateReleaseNotes: true
