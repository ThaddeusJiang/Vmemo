name: Create GitHub Release from Release PR

on:
  pull_request:
    branches:
      - main
    types:
      - closed

permissions:
  contents: write

jobs:
  create_release:
    name: create github release
    if: >-
      ${{
        github.event.pull_request.merged == true &&
        github.event.pull_request.base.ref == 'main' &&
        startsWith(github.event.pull_request.head.ref, 'release/')
      }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout merge commit
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Resolve version from mix.exs
        id: version
        run: |
          set -euo pipefail
          VERSION="$(rg -No1 'version:\s*"([0-9]{4}\.[0-9]{1,2}\.[0-9]+)"' mix.exs -r '$1')"
          if [ -z "${VERSION}" ]; then
            echo "Failed to resolve release version from mix.exs"
            exit 1
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Create or update GitHub release
        uses: actions/github-script@v8
        env:
          RELEASE_TAG: ${{ steps.version.outputs.version }}
        with:
          script: |
            const pr = context.payload.pull_request
            const labels = (pr.labels || []).map((item) => item.name)
            const prerelease = labels.includes('pre-release')
            const latest = labels.includes('latest-release')
            const makeLatest = prerelease ? 'false' : (latest ? 'true' : 'false')

            const payload = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: process.env.RELEASE_TAG,
              target_commitish: pr.merge_commit_sha,
              name: pr.title,
              body: pr.body || '',
              draft: true,
              prerelease,
              make_latest: makeLatest
            }

            try {
              const existing = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: process.env.RELEASE_TAG
              })

              const updated = await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: existing.data.id,
                name: payload.name,
                body: payload.body,
                draft: true,
                prerelease: payload.prerelease,
                make_latest: payload.make_latest
              })

              core.notice(`Updated release: ${updated.data.html_url}`)
            } catch (error) {
              if (error.status !== 404) {
                throw error
              }

              const created = await github.rest.repos.createRelease(payload)
              core.notice(`Created release: ${created.data.html_url}`)
            }
