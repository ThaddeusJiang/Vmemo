name: E2E Tests

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: Update Playwright visual snapshots
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  e2e:
    if: ${{ github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'run-e2e-testing') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: e2e-test
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      TYPESENSE_URL: ${{ secrets.TYPESENSE_URL }}
      TYPESENSE_API_KEY: ${{ secrets.TYPESENSE_API_KEY }}
      OPENROUTER_API_KEY: test-openrouter-key
      MOONDREAM_URL: ${{ secrets.MOONDREAM_URL }}
      MOONDREAM_API_KEY: ${{ secrets.MOONDREAM_API_KEY }}
      RESEND_API_KEY: test-resend-key
      PHX_SERVER: "true"
      ECTO_IPV6: "false"
      POOL_SIZE: "10"
      ADMIN_TOKEN: test-admin-password
      E2E_PGDATABASE: vmemo
      SENTRY_DSN: https://public@example.com/1
      SECRET_KEY_BASE: testtesttesttesttesttesttesttesttesttesttesttesttesttesttesttest
      PHX_HOST: localhost
      PORT: "4000"
      DNS_CLUSTER_QUERY: ""

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Build app image (amd64, local only)
        run: docker buildx build --platform linux/amd64 --file ./Dockerfile --tag thaddeusjiang/vmemo:e2e --load .

      - name: Set up Erlang/Elixir for mix warmup task
        uses: erlef/setup-beam@v1.23.0
        id: beam
        with:
          otp-version: "28"
          elixir-version: "1.19.5"

      - name: Cache deps and build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-otp-${{ steps.beam.outputs.otp-version }}-elixir-${{ steps.beam.outputs.elixir-version }}-mix-${{ env.MIX_ENV || 'dev' }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-otp-${{ steps.beam.outputs.otp-version }}-elixir-${{ steps.beam.outputs.elixir-version }}-mix-${{ env.MIX_ENV || 'dev' }}-
          retention-days: 3

      - name: Install Elixir dependencies
        run: mix deps.get
        working-directory: .

      - name: Setup Typesense schema
        run: MIX_ENV=prod mix ts.setup
        working-directory: .

      - name: Start app with compose
        run: |
          docker compose -f docker-compose.e2e.yml up -d

      - name: Seed e2e auth data
        run: |
          docker run --rm \
            -e DATABASE_URL="${DATABASE_URL}" \
            -v "$PWD/fixtures/prepare-e2e-auth.sql:/e2e/prepare-e2e-auth.sql:ro" \
            postgres:18 \
            sh -lc '
              for i in $(seq 1 120); do
                if psql "$DATABASE_URL" -tAc "SELECT to_regclass('\''public.auth_users'\'')" 2>/dev/null | grep -q auth_users; then
                  break
                fi
                sleep 1
              done

              psql "$DATABASE_URL" -tAc "SELECT to_regclass('\''public.auth_users'\'')" 2>/dev/null | grep -q auth_users || {
                echo "auth_users table was not ready after waiting"
                exit 3
              }

              psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f /e2e/prepare-e2e-auth.sql
            '

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install e2e dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers and host dependencies
        run: bunx playwright install --with-deps

      - name: Confirm app is ready
        run: curl -fsS http://localhost:4000/login >/dev/null

      - name: Update e2e snapshots
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.update_snapshots }}
        run: bun run e2e:update-snapshots

      - name: Commit updated snapshots
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.update_snapshots }}
        uses: EndBug/add-and-commit@v9
        with:
          add: "e2e-test/tests/**-snapshots"
          default_author: github_actions
          message: "chore(e2e): update Playwright snapshots"
          push: true

      - name: Run e2e tests
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.update_snapshots }}
        run: bun run e2e

      - name: Print app logs
        if: failure()
        run: docker compose -f docker-compose.e2e.yml logs vmemo || true

      - name: Stop app container
        if: always()
        run: docker compose -f docker-compose.e2e.yml down || true
