name: E2E Tests

on:
  pull_request:
    types: [labeled, synchronize, reopened]
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: Update Playwright visual snapshots
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  e2e:
    if: |
      (github.event_name == 'pull_request' &&
        contains(github.event.pull_request.labels.*.name, 'run-e2e-testing')) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vmemo_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d vmemo_dev"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      typesense:
        image: typesense/typesense:27.1
        env:
          TYPESENSE_API_KEY: xyz
          TYPESENSE_DATA_DIR: /data
        ports:
          - 8108:8108
        options: >-
          --tmpfs /data:rw,size=512m
    defaults:
      run:
        working-directory: e2e-test
    env:
      DATABASE_URL: ecto://postgres:postgres@host.docker.internal:5432/vmemo_dev
      TYPESENSE_URL: http://host.docker.internal:8108
      TYPESENSE_API_KEY: xyz
      OPENROUTER_API_KEY: test-openrouter-key
      MOONDREAM_URL: https://api.moondream.ai/v1
      MOONDREAM_API_KEY: test-moondream-key
      RESEND_API_KEY: test-resend-key
      PHX_SERVER: "true"
      ECTO_IPV6: "false"
      POOL_SIZE: "10"
      ADMIN_TOKEN: test-admin-token
      SENTRY_DSN: https://public@example.com/1
      SECRET_KEY_BASE: testtesttesttesttesttesttesttesttesttesttesttesttesttesttesttest
      PHX_HOST: localhost
      PORT: "4000"
      DNS_CLUSTER_QUERY: ""

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0

      - name: Build app image for e2e
        working-directory: .
        run: |
          docker build -t thaddeusjiang/vmemo:develop .

      - name: Wait for dependency services
        run: |
          timeout=60
          count=0
          until curl -fsS http://localhost:8108/health >/dev/null; do
            if [ $count -ge $timeout ]; then
              echo "Timeout waiting for Typesense"
              exit 1
            fi
            echo "Waiting for Typesense... ($count/$timeout)"
            sleep 1
            count=$((count + 1))
          done
          echo "Typesense is ready!"

      - name: Start app with compose
        run: |
          docker compose -f docker-compose.yml up -d

      - name: Wait for app
        run: |
          timeout=60
          count=0
          until curl -fsS http://localhost:4000/login >/dev/null; do
            if [ $count -ge $timeout ]; then
              echo "Timeout waiting for app"
              docker compose -f docker-compose.yml logs vmemo || true
              exit 1
            fi
            echo "Waiting for app... ($count/$timeout)"
            sleep 1
            count=$((count + 1))
          done
          echo "App is ready!"

      - name: Install e2e dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers and host dependencies
        run: bunx playwright install --with-deps

      - name: Prepare e2e auth user
        run: |
          docker compose -f docker-compose.yml exec -T vmemo sh -lc 'unset PHX_SERVER && mix run priv/repo/seeds/test_users.exs'

      - name: Update e2e snapshots
        # if: ${{ github.event_name == 'workflow_dispatch' && inputs.update_snapshots }}
        run: bun run e2e:update-snapshots

      - name: Commit updated snapshots
        # if: ${{ github.event_name == 'workflow_dispatch' && inputs.update_snapshots }}
        uses: EndBug/add-and-commit@v10.0.0
        with:
          add: "e2e-test/tests/**-snapshots"
          default_author: github_actions
          message: "chore(e2e): 更新 Playwright snapshots"
          push: true

      - name: Run e2e tests
        # if: ${{ github.event_name != 'workflow_dispatch' || !inputs.update_snapshots }}
        run: bun run e2e

      - name: Upload e2e artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: e2e-artifacts
          path: |
            /tmp/vmemo-e2e-*.png
            e2e-test/test-results/**
            e2e-test/tests/**-snapshots/**
          if-no-files-found: warn

      - name: Print app logs
        if: failure()
        run: docker compose -f docker-compose.yml logs vmemo || true

      - name: Stop app container
        if: always()
        run: docker compose -f docker-compose.yml down || true
