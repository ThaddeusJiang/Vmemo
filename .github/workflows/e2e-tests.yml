name: E2E Tests

on:
  pull_request:
    types: [labeled, synchronize, reopened]
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: Update Playwright visual snapshots
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-image:
    if: |
      (github.event_name == 'pull_request' &&
        contains(github.event.pull_request.labels.*.name, 'run-e2e-testing')) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Build and cache app image
        uses: ./.github/actions/build-ci-image
        with:
          image_name: thaddeusjiang/vmemo:e2e
          cache_key: vmemo-e2e-image-${{ hashFiles('Dockerfile', 'mix.exs', 'mix.lock', 'assets/**', 'config/**', 'lib/**', 'priv/**', 'rel/**') }}

  e2e:
    needs: build-image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vmemo
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d vmemo"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      typesense:
        image: typesense/typesense:27.1
        env:
          TYPESENSE_API_KEY: xyz
          TYPESENSE_DATA_DIR: /data
        ports:
          - 8108:8108
        options: >-
          --tmpfs /data:rw,size=512m
    defaults:
      run:
        working-directory: e2e-test
    env:
      VMEMO_IMAGE: thaddeusjiang/vmemo:e2e
      DATABASE_URL: ecto://postgres:postgres@host.docker.internal:5432/vmemo
      TYPESENSE_URL: http://host.docker.internal:8108
      TYPESENSE_API_KEY: xyz
      OPENROUTER_API_KEY: test-openrouter-key
      MOONDREAM_API_KEY: test-moondream-key
      RESEND_API_KEY: test-resend-key
      PHX_SERVER: "true"
      ECTO_IPV6: "false"
      POOL_SIZE: "10"
      ADMIN_PASSWORD: test-admin-password
      E2E_PGDATABASE: vmemo
      SENTRY_DSN: https://public@example.com/1
      SECRET_KEY_BASE: testtesttesttesttesttesttesttesttesttesttesttesttesttesttesttest
      PHX_HOST: localhost
      PORT: "4000"
      DNS_CLUSTER_QUERY: ""

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Download app image artifact
        uses: actions/download-artifact@v4
        with:
          name: vmemo-e2e-image
          path: /tmp/vmemo-ci-image

      - name: Load app image
        run: docker load -i /tmp/vmemo-ci-image/vmemo-e2e-image.tar

      - name: Start app with compose
        run: |
          docker compose -f docker-compose.yml up -d

      - name: Wait for dependency services
        run: |
          timeout=60
          count=0
          until curl -fsS http://localhost:8108/health >/dev/null; do
            if [ $count -ge $timeout ]; then
              echo "Timeout waiting for Typesense"
              exit 1
            fi
            echo "Waiting for Typesense... ($count/$timeout)"
            sleep 1
            count=$((count + 1))
          done
          echo "Typesense is ready!"

      - name: Wait for app
        run: |
          timeout=60
          count=0
          until curl -fsS http://localhost:4000/login >/dev/null; do
            if [ $count -ge $timeout ]; then
              echo "Timeout waiting for app"
              docker compose -f docker-compose.yml logs vmemo || true
              exit 1
            fi
            echo "Waiting for app... ($count/$timeout)"
            sleep 1
            count=$((count + 1))
          done
          echo "App is ready!"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install e2e dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers and host dependencies
        run: bunx playwright install --with-deps

      - name: Update e2e snapshots
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.update_snapshots }}
        run: bun run e2e:update-snapshots

      - name: Commit updated snapshots
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.update_snapshots }}
        uses: EndBug/add-and-commit@v9
        with:
          add: "e2e-test/tests/**-snapshots"
          default_author: github_actions
          message: "chore(e2e): 更新 Playwright snapshots"
          push: true

      - name: Run e2e tests
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.update_snapshots }}
        run: bun run e2e

      - name: Upload e2e artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts
          path: |
            /tmp/vmemo-e2e-*.png
            e2e-test/test-results/**
            e2e-test/tests/**-snapshots/**
          if-no-files-found: warn

      - name: Print app logs
        if: failure()
        run: docker compose -f docker-compose.yml logs vmemo || true

      - name: Stop app container
        if: always()
        run: docker compose -f docker-compose.yml down || true
