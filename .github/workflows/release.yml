name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version in CalVer format (YYYY.M.Patch). Leave empty to use current date."
        required: false
        type: string
      overwrite_existing_release:
        description: "Overwrite existing GitHub release with the same tag."
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    env:
      GH_REPO: ${{ github.repository }}
    outputs:
      version: ${{ steps.tags.outputs.version }}
      tag: ${{ steps.tags.outputs.tag }}
      multi_tag: ${{ steps.tags.outputs.multi_tag }}
      amd64_tag: ${{ steps.tags.outputs.amd64_tag }}
      arm64_tag: ${{ steps.tags.outputs.arm64_tag }}

    steps:
      - name: Compute Docker tags
        id: tags
        run: |
          INPUT_VERSION="${{ github.event.inputs.version }}"
          VERSION="${INPUT_VERSION}"

          if [[ -z "$VERSION" ]]; then
            VERSION="$(TZ=Asia/Tokyo date +'%Y.%-m.%-d')"
          fi

          if [[ ! "$VERSION" =~ ^[0-9]{4}\.(1[0-2]|[1-9])\.([1-9][0-9]*)$ ]]; then
            echo "Invalid release version: '$VERSION'"
            echo "Expected CalVer: YYYY.M.Patch (no leading zero, month 1-12, patch >= 1)"
            exit 1
          fi

          {
            echo "version=$VERSION"
            echo "tag=$VERSION"
            echo "multi_tag=thaddeusjiang/vmemo:${VERSION}"
            echo "amd64_tag=thaddeusjiang/vmemo:${VERSION}-amd64"
            echo "arm64_tag=thaddeusjiang/vmemo:${VERSION}-arm64"
          } >> "$GITHUB_OUTPUT"

      - name: Validate GitHub release tag availability
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tags.outputs.tag }}"
          OVERWRITE="${{ github.event.inputs.overwrite_existing_release }}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            if [[ "$OVERWRITE" != "true" ]]; then
              echo "GitHub release '$TAG' already exists."
              echo "Re-run workflow with 'overwrite_existing_release' checked to replace it."
              exit 1
            fi
          fi

  build-amd64:
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0
        with:
          driver: docker-container

      - name: Log in to Docker Hub
        uses: docker/login-action@v4.0.0
        with:
          username: thaddeusjiang
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push amd64 image
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ needs.prepare.outputs.amd64_tag }}
          cache-from: type=gha,scope=release-amd64
          cache-to: type=gha,mode=max,scope=release-amd64

  build-arm64:
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0
        with:
          driver: docker-container

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.0.0

      - name: Log in to Docker Hub
        uses: docker/login-action@v4.0.0
        with:
          username: thaddeusjiang
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push arm64 image
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/arm64/v8
          tags: ${{ needs.prepare.outputs.arm64_tag }}
          cache-from: type=gha,scope=release-arm64
          cache-to: type=gha,mode=max,scope=release-arm64

  publish:
    runs-on: ubuntu-latest
    env:
      GH_REPO: ${{ github.repository }}
    needs:
      - prepare
      - build-amd64
      - build-arm64

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0
        with:
          driver: docker-container

      - name: Log in to Docker Hub
        uses: docker/login-action@v4.0.0
        with:
          username: thaddeusjiang
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create multi-platform manifest tag
        run: |
          docker buildx imagetools create \
            -t "${{ needs.prepare.outputs.multi_tag }}" \
            "${{ needs.prepare.outputs.amd64_tag }}" \
            "${{ needs.prepare.outputs.arm64_tag }}"

      - name: Verify multi-platform manifest
        run: docker buildx imagetools inspect "${{ needs.prepare.outputs.multi_tag }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          TITLE="${{ needs.prepare.outputs.version }}"
          OVERWRITE="${{ github.event.inputs.overwrite_existing_release }}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            if [[ "$OVERWRITE" = "true" ]]; then
              echo "GitHub release '$TAG' already exists. Deleting it because overwrite is enabled."
              gh release delete "$TAG" --yes
            else
              echo "GitHub release '$TAG' already exists and overwrite is disabled."
              exit 1
            fi
          fi

          gh release create "$TAG" \
            --title "$TITLE" \
            --notes "Release $TITLE" \
            --target "${GITHUB_SHA}"
