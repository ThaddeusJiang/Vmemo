name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version in CalVer format (YYYY.M.Patch). Leave empty to use current date."
        required: false
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      DOCKER_PLATFORMS: linux/amd64,linux/arm64/v8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0
        with:
          driver: docker-container

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.0.0

      - name: Log in to Docker Hub
        uses: docker/login-action@v4.0.0
        with:
          username: thaddeusjiang
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute Docker tags
        id: tags
        run: |
          INPUT_VERSION="${{ github.event.inputs.version }}"
          VERSION="${INPUT_VERSION}"

          if [[ -z "$VERSION" ]]; then
            VERSION="$(TZ=Asia/Tokyo date +'%Y.%-m.%-d')"
          fi

          if [[ ! "$VERSION" =~ ^[0-9]{4}\.(1[0-2]|[1-9])\.([1-9][0-9]*)$ ]]; then
            echo "Invalid release version: '$VERSION'"
            echo "Expected CalVer: YYYY.M.Patch (no leading zero, month 1-12, patch >= 1)"
            exit 1
          fi

          {
            echo "version=$VERSION"
            echo "tag=$VERSION"
            echo "tags<<EOF"
            echo "thaddeusjiang/vmemo:${VERSION}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tags.outputs.tag }}"
          TITLE="${{ steps.tags.outputs.version }}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "GitHub release '$TAG' already exists."
            exit 1
          fi

          gh release create "$TAG" \
            --title "$TITLE" \
            --notes "Release $TITLE" \
            --target "${GITHUB_SHA}"

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: ${{ env.DOCKER_PLATFORMS }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Docker Hub tag description
        uses: ./.github/actions/dockerhub-tag-description
        with:
          username: thaddeusjiang
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: thaddeusjiang/vmemo
          tag: ${{ steps.tags.outputs.version }}
          commit-sha: ${{ github.sha }}

      - name: Log out from Docker Hub
        run: docker logout
