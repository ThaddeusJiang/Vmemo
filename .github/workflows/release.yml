name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version in CalVer format (YYYY.M.Patch). Leave empty to use current date."
        required: false
        type: string
      overwrite_existing_release:
        description: "Overwrite existing GitHub release with the same tag."
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILD_RECORD_UPLOAD: "false"
      DOCKER_BUILD_SUMMARY: "false"

    steps:
      - name: Compute release version
        id: version
        run: |
          INPUT_VERSION="${{ github.event.inputs.version }}"
          VERSION="${INPUT_VERSION}"

          if [[ -z "$VERSION" ]]; then
            VERSION="$(TZ=Asia/Tokyo date +'%Y.%-m.%-d')"
          fi

          if [[ ! "$VERSION" =~ ^[0-9]{4}\.(1[0-2]|[1-9])\.([1-9][0-9]*)$ ]]; then
            echo "Invalid release version: '$VERSION'"
            echo "Expected CalVer: YYYY.M.Patch (no leading zero, month 1-12, patch >= 1)"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0
        with:
          driver: docker-container

      - name: Log in to Docker Hub
        uses: docker/login-action@v4.0.0
        with:
          username: thaddeusjiang
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64/v8
          tags: thaddeusjiang/vmemo:${{ steps.version.outputs.version }}

      - name: Verify multi-platform manifest
        run: docker buildx imagetools inspect "thaddeusjiang/vmemo:${{ steps.version.outputs.version }}"

      - name: Create GitHub release
        uses: ncipollo/release-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          tag: ${{ steps.version.outputs.version }}
          commit: main
          name: Vmemo ${{ steps.version.outputs.version }}
          draft: true
          generateReleaseNotes: true
          allowUpdates: ${{ github.event.inputs.overwrite_existing_release == 'true' }}
