name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version in CalVer format (YYYY.M.Patch). Leave empty to use current date."
        required: false
        type: string
      overwrite_existing_release:
        description: "Overwrite existing GitHub release with the same tag."
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tags.outputs.version }}

    steps:
      - name: Compute Docker tags
        id: tags
        run: |
          INPUT_VERSION="${{ github.event.inputs.version }}"
          VERSION="${INPUT_VERSION}"

          if [[ -z "$VERSION" ]]; then
            VERSION="$(TZ=Asia/Tokyo date +'%Y.%-m.%-d')"
          fi

          if [[ ! "$VERSION" =~ ^[0-9]{4}\.(1[0-2]|[1-9])\.([1-9][0-9]*)$ ]]; then
            echo "Invalid release version: '$VERSION'"
            echo "Expected CalVer: YYYY.M.Patch (no leading zero, month 1-12, patch >= 1)"
            exit 1
          fi

          {
            echo "version=$VERSION"
          } >> "$GITHUB_OUTPUT"

  build:
    runs-on: ${{ matrix.runner }}
    needs: prepare
    env:
      DOCKER_BUILD_RECORD_UPLOAD: "false"
      DOCKER_BUILD_SUMMARY: "false"
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64/v8
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0
        with:
          driver: docker-container

      - name: Log in to Docker Hub
        uses: docker/login-action@v4.0.0
        with:
          username: thaddeusjiang
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: ${{ matrix.platform }}
          tags: thaddeusjiang/vmemo:${{ needs.prepare.outputs.version }}-${{ matrix.arch }}

  publish:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0
        with:
          driver: docker-container

      - name: Log in to Docker Hub
        uses: docker/login-action@v4.0.0
        with:
          username: thaddeusjiang
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create multi-platform manifest tag
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"

          docker buildx imagetools create \
            -t "thaddeusjiang/vmemo:${VERSION}" \
            "thaddeusjiang/vmemo:${VERSION}-amd64" \
            "thaddeusjiang/vmemo:${VERSION}-arm64"

      - name: Verify multi-platform manifest
        run: docker buildx imagetools inspect "thaddeusjiang/vmemo:${{ needs.prepare.outputs.version }}"

      - name: Create GitHub release
        uses: ncipollo/release-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          tag: ${{ needs.prepare.outputs.version }}
          commit: main
          name: Vmemo ${{ needs.prepare.outputs.version }}
          draft: true
          generateReleaseNotes: true
          allowUpdates: ${{ github.event.inputs.overwrite_existing_release == 'true' }}
